<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сборки - Monochrome Glass</title>
    <style>
        /* Общие сбросы */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        html { background-color: #0a0b10; scroll-behavior: smooth; }

        img {
            -webkit-user-drag: none; -khtml-user-drag: none; -moz-user-drag: none; -o-user-drag: none;
            user-select: none; pointer-events: none;
        }

        body {
            background-color: #0a0b10;
            /* Базовый темный градиент фиксируем, чтобы он не растягивался и не искажался */
            background-image: radial-gradient(circle at top right, #1f2029 0%, #13141c 50%, #0a0b10 100%);
            background-attachment: fixed;

            color: #ffffff; min-height: 100vh; overflow-x: hidden; overflow-y: auto;
            display: flex; flex-direction: column; position: relative;
            animation: pageFadeIn 1s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }
        @keyframes pageFadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.4); }

        /* ================= ПЛАВНОЕ ПОЯВЛЕНИЕ СТРАНИЦЫ (OVERLAY) ================= */
        .page-transition-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #0a0b10; z-index: 999999;
            animation: fadeOutOverlay 1s cubic-bezier(0.25, 1, 0.5, 1) 0.2s forwards;
            pointer-events: none;
        }
        @keyframes fadeOutOverlay {
            0% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }

        /* --- ФОН И ПЫЛИНКИ (ВОССТАНОВЛЕН ИЗ ТВОЕГО КОДА) --- */
        .ambient-background {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%; /* Растягиваем на всю длину страницы */
            overflow: hidden;
            z-index: -2; filter: blur(100px); -webkit-filter: blur(100px); will-change: transform; transform: translateZ(0);
        }
        .blob { position: absolute; border-radius: 50%; animation: float 25s infinite ease-in-out alternate; background: rgba(255, 255, 255, 0.05); }

        /* Раскидываем световые пятна по всей длине */
        .blob-1 { width: 50vw; height: 50vw; top: 0%; left: -10%; animation-duration: 30s; }
        .blob-2 { width: 45vw; height: 45vw; top: 30%; right: -10%; animation-duration: 35s; animation-delay: -5s; }
        .blob-3 { width: 40vw; height: 40vw; top: 60%; left: 30%; animation-duration: 28s; animation-delay: -10s; }
        .blob-4 { width: 55vw; height: 55vw; top: 85%; right: 10%; animation-duration: 32s; animation-delay: -2s; }

        @keyframes float { 0% { transform: translate3d(0, 0, 0) scale(1); } 50% { transform: translate3d(3vw, 5vh, 0) scale(1.05); } 100% { transform: translate3d(-5vw, -8vh, 0) scale(0.95); } }

        #particles-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%; /* На всю длину страницы */
            z-index: -1; pointer-events: none; overflow: hidden;
        }
        .particle { position: absolute; background: rgba(255, 255, 255, 0.8); border-radius: 50%; will-change: transform, opacity; }
        @keyframes drift { 0% { transform: translate3d(0, 0, 0); opacity: 0; } 20% { opacity: 0.3; } 80% { opacity: 0.3; } 100% { transform: translate3d(5vw, -20vh, 0); opacity: 0; } }

        /* НАВИГАЦИЯ */
        .navbar { display: flex; justify-content: center; padding: 20px 0; z-index: 100; position: fixed; width: 100%; opacity: 0; animation: navFadeDown 1s cubic-bezier(0.25, 1, 0.5, 1) 0.5s forwards; }
        @keyframes navFadeDown { 0% { opacity: 0; transform: translateY(-30px); } 100% { opacity: 1; transform: translateY(0); } }
        .navbar-menu {
            display: flex; gap: 30px; padding: 15px 40px; border-radius: 30px;
            background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.05); border-top: 1px solid rgba(255, 255, 255, 0.2); border-left: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
        }
        .navbar-menu a { text-decoration: none; color: rgba(255, 255, 255, 0.6); font-size: 13px; font-weight: 600; letter-spacing: 1px; transition: color 0.3s; }
        .navbar-menu a:hover { color: #ffffff; }
        .navbar-menu a.active { color: #ffffff; border-bottom: 2px solid #fff; padding-bottom: 2px; }

        /* ================= 1 ЭКРАН: ОСНОВНОЙ БЛОК ================= */
        .builds-container { display: flex; flex: 0 0 100vh; padding: 120px 60px 40px 100px; align-items: center; position: relative; z-index: 10; }

        /* ЛЕВАЯ ПАНЕЛЬ */
        .info-panel-wrapper {
            flex: 0 0 32%; max-width: 450px; z-index: 10;
            opacity: 0; transform: translateX(-100vw);
            animation: slideInLeft 1.5s cubic-bezier(0.2, 1, 0.3, 1) 0.5s forwards;
        }
        @keyframes slideInLeft { to { opacity: 1; transform: translateX(0); } }

        .build-info-panel {
            background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border-radius: 40px; padding: 50px; position: relative; overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05); border-top: 2px solid rgba(255, 255, 255, 0.3); border-left: 2px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6), inset 0 0 40px rgba(255, 255, 255, 0.02);
            transition: opacity 0.25s ease, transform 0.25s ease;
        }
        .build-info-panel.updating { opacity: 0; transform: translateX(-20px); }

        .build-info-panel h1 { font-size: 3.5rem; font-weight: 900; margin-bottom: 10px; text-transform: uppercase; background: linear-gradient(135deg, #fff, rgba(255,255,255,0.4)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .build-info-panel h3 { font-size: 1.5rem; color: rgba(255, 255, 255, 0.8); margin-bottom: 30px; font-weight: 400; font-style: italic; }
        .build-info-panel p { font-size: 1.1rem; line-height: 1.7; color: rgba(255, 255, 255, 0.6); margin-bottom: 40px; }
        .build-price { font-size: 2.5rem; font-weight: bold; color: #fff; margin-bottom: 30px; }

        .buy-btn {
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.3);
            color: white; font-size: 1.1rem; font-weight: bold; padding: 15px 30px; border-radius: 20px;
            cursor: pointer; backdrop-filter: blur(10px); transition: all 0.3s; width: 100%;
        }
        .buy-btn:hover { background: rgba(255, 255, 255, 0.2); box-shadow: 0 0 20px rgba(255, 255, 255, 0.2); transform: translateY(-2px); }

        /* ПРАВАЯ ПАНЕЛЬ: КАРУСЕЛЬ */
        .carousel-wrapper {
            flex: 1; height: 100%; position: relative; perspective: 2000px;
            display: flex; align-items: center; user-select: none;
            opacity: 0; transform: scale(1.1) translateZ(-100px);
            animation: carouselEnter 1.5s cubic-bezier(0.2, 1, 0.3, 1) 0.6s forwards;
            --drag-x: 0px; --rot-x: 0deg; --rot-y: 0deg;
        }
        @keyframes carouselEnter {
            to { opacity: 1; transform: scale(1) translateZ(0); }
        }

        .build-3d-box {
            position: absolute; width: 500px; height: 700px; transform-style: preserve-3d;
            top: 50%; left: 50%; margin-top: -350px; margin-left: -250px;
            transition: transform var(--trans-speed, 1.2s) cubic-bezier(0.33, 1, 0.68, 1), margin-top var(--trans-speed, 1.2s) ease;
            will-change: transform;
        }

        .glass-layer {
            position: absolute; inset: 0; border-radius: 40px; pointer-events: none; border: 1px solid rgba(255, 255, 255, 0.08);
            transition: opacity var(--trans-speed, 1.2s) ease, filter var(--trans-speed, 1.2s) ease;
        }

        .layer-8 { transform: translateZ(-50px); background: rgba(10, 11, 16, 0.7); box-shadow: 0 40px 80px rgba(0,0,0,0.9); }
        .layer-7 { transform: translateZ(-35px); background: rgba(255, 255, 255, 0.01); }
        .layer-6 { transform: translateZ(-20px); background: rgba(255, 255, 255, 0.01); }
        .layer-5 { transform: translateZ(-5px);  background: rgba(255, 255, 255, 0.01); }
        .layer-4 { transform: translateZ(10px);  background: rgba(255, 255, 255, 0.01); }
        .layer-3 { transform: translateZ(25px);  background: rgba(255, 255, 255, 0.01); }
        .layer-2 { transform: translateZ(40px);  background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(8px); }
        .layer-1 {
            transform: translateZ(55px);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.15) 0%, rgba(255, 255, 255, 0.02) 50%, transparent 100%);
            border-top: 2px solid rgba(255, 255, 255, 0.4); border-left: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: inset 0 0 30px rgba(255, 255, 255, 0.05);
        }

/* КАРТИНКА (Базовое состояние - спрятана глубоко внутри стекла) */

.pc-image {

position: absolute; bottom: 0; right: 0; margin: auto; border: none;

width: 190%; height: 190%; left: -45%; top: -20%; object-fit: contain;

/* ИСПРАВЛЕНИЕ 2D: По умолчанию системник сидит на глубине 20px (внутри стекла), маскируя свои тонкие края */

transform: translateZ(20px) translateY(0px) rotateX(0deg) rotateY(0deg) scale(1);

z-index: 10;

transition: transform 1.2s cubic-bezier(0.33, 1, 0.68, 1), opacity 1.2s ease, filter 1.2s ease;

}

        .build-active {
            transform: translateX(calc(120px + var(--drag-x, 0px))) translateZ(100px) scale(1) rotateX(var(--rot-x, 0deg)) rotateY(calc(-35deg + var(--rot-y, 0deg)));
            z-index: 5; cursor: grab; animation: buildFloat 1s ease-in-out infinite alternate;
        }
        .build-active:active { cursor: grabbing; }
        @keyframes buildFloat { 0% { margin-top: -350px; } 100% { margin-top: -370px; } }

        .build-active .glass-layer { opacity: 1; filter: brightness(1); }
        .build-active .pc-image { filter: brightness(1) drop-shadow(0 40px 50px rgba(0, 0, 0, 0.9)); }

        .carousel-wrapper:not(.is-sliding) .build-active .pc-image {
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), filter 0.4s ease, opacity var(--trans-speed, 1.2s) ease;
        }
        .carousel-wrapper:not(.is-sliding) .build-active:hover .pc-image {
            transform: translateZ(140px) scale(1.03); filter: brightness(1.15) drop-shadow(0 60px 70px rgba(0, 0, 0, 0.8));
        }

        .build-prev {
            transform: translateX(-180px) translateZ(-150px) rotateY(15deg) scale(0.6); z-index: 3; cursor: pointer;
        }
        .build-prev .glass-layer { filter: brightness(0.5); }
        .build-prev .pc-image { filter: brightness(0.5) drop-shadow(0 20px 30px rgba(0, 0, 0, 0.9)); }
        .build-prev:hover .glass-layer { filter: brightness(0.8); }
        .build-prev:hover .pc-image { filter: brightness(0.8) drop-shadow(0 20px 30px rgba(0, 0, 0, 0.9)); }

        .build-hidden {
            transform: translateX(400px) translateZ(-400px) rotateY(-15deg) scale(0.4); z-index: 1; pointer-events: none;
        }
        .build-hidden .glass-layer, .build-hidden .pc-image { opacity: 0; filter: brightness(0); }
        .carousel-wrapper.is-dragging .build-3d-box { transition: none !important; }

        /* ================= 2 ЭКРАН: КАТАЛОГ СБОРОК ================= */
        .catalog-section {
            width: 100%; padding: 80px 100px; max-width: 1600px; margin: 0 auto; position: relative; z-index: 10;
        }

        .catalog-header {
            text-align: center; border-bottom: 1px solid rgba(255, 255, 255, 0.1); padding-bottom: 20px; margin-bottom: 50px;
            opacity: 0; transform: translateY(30px);
            transition: opacity 0.8s ease, transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .catalog-header.is-visible { opacity: 1; transform: translateY(0); }
        .catalog-header h2 { font-size: 2.5rem; font-weight: bold; color: #fff; text-transform: uppercase; }

        .catalog-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 30px; justify-content: center; }

        .catalog-card {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.01) 100%);
            border: 1px solid rgba(255, 255, 255, 0.08); border-top: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 15px; padding: 30px 20px; display: flex; flex-direction: column;
            align-items: center; cursor: pointer; position: relative;
            overflow: hidden; backdrop-filter: blur(10px);
            opacity: 0; transform: translateY(50px);
            transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease, border-color 0.3s ease, background 0.3s ease;
        }

        .catalog-card.is-visible { opacity: 1; transform: translateY(0); }

        .catalog-card.is-visible:hover {
            transform: translateY(-8px); background: linear-gradient(180deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.02) 100%);
            border-color: rgba(255, 255, 255, 0.3); box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
        }

        .catalog-card img {
            width: 85%; height: 180px; object-fit: contain; margin-bottom: 25px;
            filter: drop-shadow(0 15px 15px rgba(0, 0, 0, 0.5)); transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .catalog-card.is-visible:hover img { transform: scale(1.08) translateY(-5px); }

        .card-info { width: 100%; display: flex; flex-direction: column; align-items: flex-start; }
        .card-title { color: #fff; font-size: 1.1rem; font-weight: 600; margin-bottom: 8px; }
        .card-price { color: rgba(255, 255, 255, 0.6); font-size: 1rem; font-weight: bold; }

        /* ================= ТУЛТИП КАТАЛОГА ================= */
        .specs-tooltip {
            position: fixed; top: 0; left: 0; background: rgba(15, 16, 26, 0.95);
            backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.15);
            border-top: 2px solid rgba(255, 255, 255, 0.3); border-radius: 12px; padding: 20px;
            width: 280px; color: white; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8), 0 0 20px rgba(255, 255, 255, 0.05);
            pointer-events: none; opacity: 0; z-index: 9999; transition: opacity 0.2s ease;
        }
        .tt-header { font-size: 1.1rem; font-weight: bold; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .tt-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 0.85rem; }
        .tt-label { color: rgba(255, 255, 255, 0.5); }
        .tt-value { color: #fff; font-weight: 600; text-align: right; max-width: 60%; }

    </style>
</head>

    </div>

    <script>
        // Анимация 100 пылинок
        const particlesContainer = document.getElementById('particles-container');
        for (let i = 0; i < 100; i++) {
            let p = document.createElement('div'); p.classList.add('particle');

            p.style.left = `${Math.random() * 100}%`;

            p.style.animation = `drift ${Math.random() * 20 + 15}s linear ${Math.random() * 10}s infinite`;

        }

            {

            {

                img: "PC_1.png", specs: { cpu: "AMD Ryzen 7 7800X3D", gpu: "NVIDIA RTX 4070 SUPER", ram: "32GB DDR5", ssd: "2TB M.2" }
            },
            {
                title: "СБОРКА #6", subtitle: "Рабочая станция", price: "$3,200",
                desc: "Создана для профессионалов: видеомонтаж, 3D моделирование.",
                img: "PC_2.png", specs: { cpu: "AMD Ryzen 9 7950X", gpu: "NVIDIA RTX 4080", ram: "64GB DDR5", ssd: "4TB Gen4" }
            },
            {
                title: "СБОРКА #7", subtitle: "Стример Эдишн", price: "$2,100",
                desc: "Идеально сбалансирована для игр и проведения прямых трансляций одновременно.",
                img: "PC_3.png", specs: { cpu: "Intel Core i7-13700K", gpu: "NVIDIA RTX 4070 Ti", ram: "32GB DDR5", ssd: "2TB M.2" }
            },
            {
                title: "СБОРКА #8", subtitle: "Бюджетный хит", price: "$750",
                desc: "Лучшее решение для тех, кто хочет играть в новинки, но ограничен в бюджете.",
                img: "PC_4.png", specs: { cpu: "Intel Core i3-12100F", gpu: "NVIDIA RTX 3050", ram: "16GB DDR4", ssd: "512GB M.2" }
            }
        ];

        // --- ЛОГИКА СЛАЙДЕРА (С УМНЫМ АВТОСТАРТОМ) ---
        const carouselArea = document.getElementById('carousel-area');
        const infoPanel = document.getElementById('info-panel');
        const elTitle = document.getElementById('b-title');
        const elSubtitle = document.getElementById('b-subtitle');
        const elDesc = document.getElementById('b-desc');
        const elPrice = document.getElementById('b-price');

        let currentIndex = 0;
        let boxes = [];
        let isIntroPlaying = true;
        let slideTimeouts = [];

        buildsData.slice(0, 4).forEach((build, index) => {
            const box = document.createElement('div');
            box.className = 'build-3d-box';
            box.innerHTML = `
                <div class="glass-layer layer-8"></div><div class="glass-layer layer-7"></div>
                <div class="glass-layer layer-6"></div><div class="glass-layer layer-5"></div>
                <div class="glass-layer layer-4"></div><div class="glass-layer layer-3"></div>
                <div class="glass-layer layer-2"></div><div class="glass-layer layer-1"></div>
                <img src="${build.img}" class="pc-image" draggable="false">
            `;
            box.addEventListener('click', () => {
                if (isIntroPlaying || carouselArea.classList.contains('is-sliding')) return;
                if (box.classList.contains('build-prev')) prevSlide();
            });
            carouselArea.appendChild(box);
            boxes.push(box);
        });

        function updateCarousel(speed = 1200) {
            carouselArea.classList.add('is-sliding');
            carouselArea.style.setProperty('--trans-speed', `${speed}ms`);

            slideTimeouts.forEach(clearTimeout);
            slideTimeouts = [];

            carouselArea.style.setProperty('--drag-x', `0px`);
            carouselArea.style.setProperty('--rot-x', `0deg`);
            carouselArea.style.setProperty('--rot-y', `0deg`);

            boxes.forEach((box, i) => {
                box.className = 'build-3d-box';
                const prevIndex = (currentIndex - 1 + 4) % 4;
                if (i === currentIndex) box.classList.add('build-active');
                else if (i === prevIndex) box.classList.add('build-prev');
                else box.classList.add('build-hidden');
            });

            let textFadeSpeed = Math.max(50, Math.min(250, speed * 0.4));
            infoPanel.style.transitionDuration = `${textFadeSpeed}ms`;
            infoPanel.classList.add('updating');

            slideTimeouts.push(setTimeout(() => {
                const currentData = buildsData[currentIndex];
                elTitle.textContent = currentData.title;
                elSubtitle.textContent = currentData.subtitle;
                elDesc.textContent = currentData.desc;
                elPrice.textContent = currentData.price;
                infoPanel.classList.remove('updating');
            }, textFadeSpeed));

            slideTimeouts.push(setTimeout(() => {
                if (!isIntroPlaying) carouselArea.classList.remove('is-sliding');
            }, speed));
        }

        function prevSlide() { if(isIntroPlaying) return; currentIndex = (currentIndex - 1 + 4) % 4; updateCarousel(); }
        function nextSlide() { if(isIntroPlaying) return; currentIndex = (currentIndex + 1) % 4; updateCarousel(); }

        updateCarousel(0);

        async function playIntro() {
            const introSpeeds = [ 250, 450, 650, 850 ];
            await new Promise(r => setTimeout(r, 50));
            for (let speed of introSpeeds) {
                currentIndex = (currentIndex + 1) % 4;
                updateCarousel(speed);
                await new Promise(r => setTimeout(r, speed));
            }
            isIntroPlaying = false;
            carouselArea.classList.remove('is-sliding');
            carouselArea.style.setProperty('--trans-speed', `1.2s`);
        }
        playIntro();

        // Свайпы мышью
        let isDragging = false, startX = 0, dragX = 0;
        let activeBoxNode = null;

        function dragStart(e) {
            if (isIntroPlaying) return;
            const targetBox = e.target.closest('.build-3d-box');
            if (!targetBox || !targetBox.classList.contains('build-active')) return;
            if (carouselArea.classList.contains('is-sliding')) return;

            e.preventDefault();
            isDragging = true;
            activeBoxNode = targetBox;
            startX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            activeBoxNode.style.transition = 'none';
            carouselArea.classList.add('is-dragging');
        }

        function dragMove(e) {
            if (!isDragging || !activeBoxNode) return;
            let currentX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            dragX = currentX - startX;
            carouselArea.style.setProperty('--drag-x', `${dragX}px`);
            carouselArea.style.setProperty('--rot-y', `${dragX / 10}deg`);
            carouselArea.style.setProperty('--rot-x', `0deg`);
        }

        function dragEnd(e) {
            if (!isDragging || !activeBoxNode) return;
            isDragging = false;
            carouselArea.classList.remove('is-dragging');
            activeBoxNode.style.transition = '';
            activeBoxNode = null;

            if (dragX < -120) nextSlide();
            else if (dragX > 120) prevSlide();
            else {
                carouselArea.classList.add('is-sliding');
                carouselArea.style.setProperty('--drag-x', `0px`);
                carouselArea.style.setProperty('--rot-y', `0deg`);
                setTimeout(() => { carouselArea.classList.remove('is-sliding'); }, 1200);
            }
            dragX = 0;
        }

        window.addEventListener('mousedown', dragStart);
        window.addEventListener('mousemove', dragMove);
        window.addEventListener('mouseup', dragEnd);
        window.addEventListener('touchstart', dragStart, {passive: false});
        window.addEventListener('touchmove', dragMove, {passive: true});
        window.addEventListener('touchend', dragEnd);

        carouselArea.addEventListener('mousemove', (e) => {
            if (isIntroPlaying || isDragging || carouselArea.classList.contains('is-sliding')) return;
            const activeBox = document.querySelector('.build-active');
            if (!activeBox) return;

            const rect = carouselArea.getBoundingClientRect();
            const centerX = rect.left + (rect.width / 2) + 120;
            const centerY = rect.top + (rect.height / 2);
            const x = e.clientX - centerX;
            const y = e.clientY - centerY;

            carouselArea.style.setProperty('--rot-y', `${x / 30}deg`);
            carouselArea.style.setProperty('--rot-x', `${-y / 30}deg`);
        });

        // ================= ЛОГИКА КАТАЛОГА СБОРОК И ТУЛТИПА =================
        const catalogGrid = document.getElementById('catalog-grid');
        const tooltip = document.getElementById('specs-tooltip');
        const ttName = document.getElementById('tt-name');
        const ttCpu = document.getElementById('tt-cpu');
        const ttGpu = document.getElementById('tt-gpu');
        const ttRam = document.getElementById('tt-ram');
        const ttSsd = document.getElementById('tt-ssd');

        buildsData.forEach((item) => {
            const card = document.createElement('div');
            card.className = 'catalog-card';
            card.innerHTML = `
                <img src="${item.img}" alt="${item.title}">
                <div class="card-info">
                    <div class="card-title">${item.title}</div>
                    <div class="card-price">${item.price}</div>
                </div>
            `;

            card.addEventListener('mouseenter', () => {
                ttName.textContent = item.title;
                ttCpu.textContent = item.specs.cpu;
                ttGpu.textContent = item.specs.gpu;
                ttRam.textContent = item.specs.ram;
                ttSsd.textContent = item.specs.ssd;
                tooltip.style.opacity = '1';
            });

            card.addEventListener('mousemove', (e) => {
                let x = e.clientX + 20;
                let y = e.clientY + 20;
                const ttRect = tooltip.getBoundingClientRect();

                if (x + ttRect.width > window.innerWidth) x = e.clientX - ttRect.width - 20;
                if (y + ttRect.height > window.innerHeight) y = e.clientY - ttRect.height - 20;

                tooltip.style.left = `${x}px`;
                tooltip.style.top = `${y}px`;
            });

            card.addEventListener('mouseleave', () => { tooltip.style.opacity = '0'; });
            catalogGrid.appendChild(card);
        });

        // ================= АНИМАЦИЯ КАРТОЧЕК ПРИ СКРОЛЛЕ =================
        const scrollObserver = new IntersectionObserver((entries) => {
            let delay = 0;
            entries.forEach((entry) => {
                if (entry.isIntersecting) {
                    setTimeout(() => {
                        entry.target.classList.add('is-visible');
                    }, delay);
                    delay += 150;
                    scrollObserver.unobserve(entry.target);
                }
            });
        }, { threshold: 0.1 });

        scrollObserver.observe(document.getElementById('catalog-header'));
        document.querySelectorAll('.catalog-card').forEach(card => {
            scrollObserver.observe(card);
        });

    </script>
</body>
</html>
