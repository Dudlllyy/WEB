<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог - Monochrome Glass</title>
    <style>
        /* Общие сбросы */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        html { background-color: #0a0b10; }

        body {
            background-color: #0a0b10;
            /* Базовый темный градиент фиксируем, чтобы он не растягивался и не искажался */
            background-image: radial-gradient(circle at top right, #1f2029 0%, #13141c 50%, #0a0b10 100%);
            background-attachment: fixed;

            color: #ffffff; min-height: 100vh; overflow-x: hidden;
            display: flex; flex-direction: column; position: relative;
            animation: pageFadeIn 1s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }
        @keyframes pageFadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        /* Скроллбар */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.4); }

        /* --- ФОН И ПЫЛИНКИ (ТЕПЕРЬ ПРОКРУЧИВАЮТСЯ ВМЕСТЕ С САЙТОМ) --- */
        .ambient-background {
            position: absolute; /* Было fixed */
            top: 0; left: 0; width: 100%; height: 100%; /* Растягиваем на всю длину страницы */
            overflow: hidden;
            z-index: -2; filter: blur(100px); -webkit-filter: blur(100px); will-change: transform; transform: translateZ(0);
        }
        .blob { position: absolute; border-radius: 50%; animation: float 25s infinite ease-in-out alternate; background: rgba(255, 255, 255, 0.05); }

        /* Раскидываем световые пятна по всей длине каталога */
        .blob-1 { width: 50vw; height: 50vw; top: 0%; left: -10%; animation-duration: 30s; }
        .blob-2 { width: 45vw; height: 45vw; top: 30%; right: -10%; animation-duration: 35s; animation-delay: -5s; }
        .blob-3 { width: 40vw; height: 40vw; top: 60%; left: 30%; animation-duration: 28s; animation-delay: -10s; }
        .blob-4 { width: 55vw; height: 55vw; top: 85%; right: 10%; animation-duration: 32s; animation-delay: -2s; }

        @keyframes float { 0% { transform: translate3d(0, 0, 0) scale(1); } 50% { transform: translate3d(3vw, 5vh, 0) scale(1.05); } 100% { transform: translate3d(-5vw, -8vh, 0) scale(0.95); } }

        #particles-container {
            position: absolute; /* Было fixed */
            top: 0; left: 0; width: 100%; height: 100%; /* На всю длину страницы */
            z-index: -1; pointer-events: none; overflow: hidden;
        }
        .particle { position: absolute; background: rgba(255, 255, 255, 0.8); border-radius: 50%; will-change: transform, opacity; }
        @keyframes drift { 0% { transform: translate3d(0, 0, 0); opacity: 0; } 20% { opacity: 0.3; } 80% { opacity: 0.3; } 100% { transform: translate3d(5vw, -20vh, 0); opacity: 0; } }

        /* НАВИГАЦИЯ */
        .navbar {
            display: flex; justify-content: center; padding: 20px 0; z-index: 100; position: fixed; width: 100%;
            animation: navFadeDown 1s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }
        @keyframes navFadeDown {
            0% { opacity: 0; transform: translateY(-30px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .navbar-menu {
            display: flex; gap: 30px; padding: 15px 40px; border-radius: 30px;
            background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.05); border-top: 1px solid rgba(255, 255, 255, 0.2); border-left: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
        }
        .navbar-menu a { text-decoration: none; color: rgba(255, 255, 255, 0.6); font-size: 13px; font-weight: 600; letter-spacing: 1px; transition: color 0.3s; }
        .navbar-menu a:hover { color: #ffffff; }
        .navbar-menu a.active { color: #ffffff; border-bottom: 2px solid #fff; padding-bottom: 2px; }

        /* ================= КАТАЛОГ СЕТКА ================= */
        .catalog-section {
            padding: 120px 80px 80px; max-width: 1600px; margin: 0 auto; width: 100%;
            opacity: 0; animation: contentFadeUp 1.2s cubic-bezier(0.25, 1, 0.5, 1) 0.2s forwards;
        }
        @keyframes contentFadeUp {
            0% { opacity: 0; transform: translateY(40px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .catalog-title { font-size: 5rem; font-weight: bold; margin-bottom: 40px; color: rgba(255, 255, 255, 0.9); font-style: italic; }

        .bento-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: 250px;
            gap: 25px;
            perspective: 1200px;
        }

        .span-2-col { grid-column: span 2; }
        .span-2-row { grid-row: span 2; }
        .span-large { grid-column: span 2; grid-row: span 2; }

        /* ================= КАРТОЧКА ТОВАРА ================= */
        .bento-card {
            position: relative; width: 100%; height: 100%; border-radius: 30px; cursor: pointer;
            transform-style: preserve-3d; transition: transform 0.1s ease-out;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .border-glow-wrapper {
            position: absolute; inset: -1px; border-radius: 30px; padding: 2px;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor; mask-composite: exclude;
            z-index: 3; pointer-events: none; opacity: 0; transition: opacity 0.3s ease;
            overflow: hidden;
        }
        .bento-card:hover .border-glow-wrapper { opacity: 1; }

        .border-glow {
            position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(from 0deg, transparent 0%, transparent 80%, rgba(255, 255, 255, 0.4) 95%, rgba(255, 255, 255, 1) 100%);
            animation: spin 2.5s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .card-inner {
            position: absolute; inset: 0; border-radius: 30px;
            background: rgba(15, 16, 24, 0.4); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.02), inset 1px 1px 2px rgba(255, 255, 255, 0.15);
            z-index: 2; display: flex; justify-content: center; align-items: center; transform-style: preserve-3d;
        }

        .card-img {
            max-width: 80%; max-height: 80%; object-fit: contain; filter: drop-shadow(0 15px 20px rgba(0, 0, 0, 0.5));
            transition: transform 0.4s ease; transform: translateZ(40px); will-change: transform;
        }
        .bento-card:hover .card-img { transform: translateZ(70px) scale(1.05); }

        .card-title {
            position: absolute; bottom: 25px; left: 25px; font-size: 1.5rem; font-weight: bold; color: #fff;
            z-index: 4; display: flex; transform: translateZ(30px); transform-style: preserve-3d;
        }
        .card-title span {
            display: inline-block; opacity: 0; transform: translateY(20px);
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.3s;
        }
        .bento-card:hover .card-title span { opacity: 1; transform: translateY(0); }

        /* ================= МОДАЛЬНОЕ ОКНО ================= */
        .catalog-modal {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(10, 11, 16, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            z-index: 1000; display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.4s ease;
        }
        .catalog-modal.active { opacity: 1; pointer-events: all; }

        .modal-content-wrapper { display: flex; width: 80%; max-width: 1200px; height: 70vh; gap: 40px; }

        .modal-img-container {
            flex: 1; background: rgba(255, 255, 255, 0.02); border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: inset 0 0 30px rgba(255, 255, 255, 0.05);
            display: flex; justify-content: center; align-items: center;
            transform: scale(0.8); transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .catalog-modal.active .modal-img-container { transform: scale(1); }
        .modal-img { max-width: 80%; max-height: 80%; filter: drop-shadow(0 30px 40px rgba(0,0,0,0.7)); }

        .modal-details {
            flex: 1; background: rgba(255, 255, 255, 0.02); border-radius: 30px; padding: 50px;
            border: 1px solid rgba(255, 255, 255, 0.05); border-left: 2px solid rgba(255, 255, 255, 0.3);
            display: flex; flex-direction: column; justify-content: center;
            transform: translateX(50px); opacity: 0; transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1); transition-delay: 0.1s;
        }
        .catalog-modal.active .modal-details { transform: translateX(0); opacity: 1; }

        .modal-details h2 { font-size: 3rem; margin-bottom: 20px; }
        .modal-details p { font-size: 1.1rem; color: rgba(255, 255, 255, 0.7); line-height: 1.6; margin-bottom: 30px; }
        .modal-details .price { font-size: 2.5rem; font-weight: bold; color: #fff; }

        .close-modal {
            position: absolute; top: 40px; right: 40px; font-size: 3rem; color: rgba(255, 255, 255, 0.5);
            cursor: pointer; transition: color 0.3s;
        }
        .close-modal:hover { color: #fff; }

    </style>
</head>
<body>

    <!-- Фоны -->
    <div class="ambient-background">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        <div class="blob blob-4"></div> <!-- Добавили четвертое пятно вниз -->
    </div>
    <div id="particles-container"></div>

    <!-- Навигация -->
    <header class="navbar">
        <nav class="navbar-menu">
            <a href="index.html">ГЛАВНОЕ</a>
            <a href="#" class="active">КАТАЛОГ</a>
            <a href="#">ЦЕНЫ</a>
            <a href="#">БЛОГ</a>
            <a href="#">КОНТАКТЫ</a>
            <a href="#">КАБИНЕТ</a>
        </nav>
    </header>

    <!-- ОСНОВНАЯ СЕКЦИЯ: КАТАЛОГ -->
    <section class="catalog-section">
        <h1 class="catalog-title">Каталог</h1>

        <div class="bento-grid">

            <div class="bento-card span-2-row" data-title="RTX 4090" data-desc="Флагманская видеокарта с невероятной мощностью. Оснащена новейшей системой охлаждения и трассировкой лучей." data-price="$1,599">
                <div class="border-glow-wrapper"><div class="border-glow"></div></div>
                <div class="card-inner">
                    <img src="RTX_4090.png" class="card-img" alt="GPU" draggable="false">
                    <h3 class="card-title">RTX 4090</h3>
                </div>
            </div>

            <div class="bento-card span-2-col" data-title="Intel i9" data-desc="Высокопроизводительный процессор для любых рабочих задач и киберспорта." data-price="$599">
                <div class="border-glow-wrapper"><div class="border-glow"></div></div>
                <div class="card-inner">
                    <img src="Intel_i9.png" class="card-img" alt="CPU" draggable="false">
                    <h3 class="card-title">Intel i9</h3>
                </div>
            </div>

            <div class="bento-card" data-title="Fury RAM" data-desc="Быстрая оперативная память стандарта DDR5." data-price="$199">
                <div class="border-glow-wrapper"><div class="border-glow"></div></div>
                <div class="card-inner">
                    <img src="Fyru_RAM.png" class="card-img" alt="RAM" draggable="false">
                    <h3 class="card-title">Fury RAM</h3>
                </div>
            </div>

            <div class="bento-card span-large" data-title="Z790 Motherboard" data-desc="Материнская плата премиум-класса для оверклокинга. Поддержка PCIe 5.0 и Wi-Fi 6E." data-price="$499">
                <div class="border-glow-wrapper"><div class="border-glow"></div></div>
                <div class="card-inner">
                    <img src="Mother_board.png" class="card-img" alt="MB" draggable="false">
                    <h3 class="card-title">Z790 Board</h3>
                </div>
            </div>

            <div class="bento-card" data-title="Crucial M.2" data-desc="Сверхбыстрый SSD накопитель на 2 ТБ." data-price="$150">
                <div class="border-glow-wrapper"><div class="border-glow"></div></div>
                <div class="card-inner">
                    <img src="SSD_m2.png" class="card-img" alt="SSD" draggable="false">
                    <h3 class="card-title">Crucial M.2</h3>
                </div>
            </div>

             <div class="bento-card span-2-col" data-title="RX 7900 XTX" data-desc="Мощный конкурент от AMD. Идеально для 4K гейминга без компромиссов." data-price="$999">
                <div class="border-glow-wrapper"><div class="border-glow"></div></div>
                <div class="card-inner">
                    <img src="videocard.png" class="card-img" alt="GPU AMD" draggable="false">
                    <h3 class="card-title">RX 7900</h3>
                </div>
            </div>

        </div>
    </section>

    <!-- ВСПЛЫВАЮЩЕЕ ОКНО (MODAL) -->
    <div class="catalog-modal" id="modal">
        <div class="close-modal" id="close-btn">&times;</div>
        <div class="modal-content-wrapper">
            <div class="modal-img-container">
                <img src="" id="modal-img" class="modal-img">
            </div>
            <div class="modal-details">
                <h2 id="modal-title">Название</h2>
                <p id="modal-desc">Подробное описание товара...</p>
                <div class="price" id="modal-price">$0</div>
            </div>
        </div>
    </div>


    <script>
        // --- 1. ПЫЛИНКИ (РАСКИДЫВАЕМ ПО ВСЕЙ ВЫСОТЕ В %) ---
        const particlesContainer = document.getElementById('particles-container');
        for (let i = 0; i < 100; i++) { // Увеличили количество пылинок до 100
            let p = document.createElement('div'); p.classList.add('particle');
            p.style.width = p.style.height = `${Math.random() * 1.5 + 1}px`;

            // ВАЖНО: Теперь используем % вместо vw/vh, чтобы пылинки распределились по всей длине скролла
            p.style.left = `${Math.random() * 100}%`;
            p.style.top = `${Math.random() * 100}%`;

            p.style.animation = `drift ${Math.random() * 20 + 15}s linear ${Math.random() * 10}s infinite`;
            particlesContainer.appendChild(p);
        }

        // --- 2. АНИМАЦИЯ БУКВ ---
        const titles = document.querySelectorAll('.card-title');
        titles.forEach(title => {
            const text = title.textContent;
            title.textContent = '';
            text.split('').forEach((char, index) => {
                const span = document.createElement('span');
                span.textContent = char === ' ' ? '\u00A0' : char;
                span.style.transitionDelay = `${index * 0.05}s`;
                title.appendChild(span);
            });
        });

        // --- 3. 3D НАКЛОН ---
        const cards = document.querySelectorAll('.bento-card');
        cards.forEach(card => {
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;

                const rotateX = ((y - centerY) / centerY) * -10;
                const rotateY = ((x - centerX) / centerX) * 10;

                card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.02, 1.02, 1.02)`;
            });

            card.addEventListener('mouseleave', () => {
                card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`;
            });
        });

        // --- 4. МОДАЛЬНОЕ ОКНО ---
        const modal = document.getElementById('modal');
        const closeBtn = document.getElementById('close-btn');
        const modalImg = document.getElementById('modal-img');
        const modalTitle = document.getElementById('modal-title');
        const modalDesc = document.getElementById('modal-desc');
        const modalPrice = document.getElementById('modal-price');

        cards.forEach(card => {
            card.addEventListener('click', () => {
                const title = card.getAttribute('data-title');
                const desc = card.getAttribute('data-desc');
                const price = card.getAttribute('data-price');
                const imgSrc = card.querySelector('.card-img').src;

                modalImg.src = imgSrc;
                modalTitle.textContent = title;
                modalDesc.textContent = desc;
                modalPrice.textContent = price;

                modal.classList.add('active');
                document.body.style.overflow = 'hidden';
            });
        });

        closeBtn.addEventListener('click', () => {
            modal.classList.remove('active');
            document.body.style.overflow = 'auto';
        });

        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.classList.remove('active');
                document.body.style.overflow = 'auto';
            }
        });

    </script>
</body>
</html>
